<header class="nav" [class.scrolled]="scrolled()">
  <div class="nav__inner">

    <a routerLink="/" class="nav__logo">
      <span class="nav__logo-icon">📚</span>
      <span class="nav__logo-text">Hardcover</span>
      <span class="nav__logo-tag">Nonfiction</span>
    </a>

    <nav class="nav__links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Trending</a>
      <a routerLink="/search" [queryParams]="{q:'biography'}" routerLinkActive="active">Biography</a>
      <a routerLink="/search" [queryParams]="{q:'history'}" routerLinkActive="active">History</a>
      <a routerLink="/search" [queryParams]="{q:'science'}" routerLinkActive="active">Science</a>
    </nav>

    <div class="nav__actions">
      <button
        class="nav__search-btn"
        (click)="toggleSearch()"
        [class.active]="searchOpen()"
        aria-label="Toggle search"
      >
        <svg *ngIf="!searchOpen()" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <svg *ngIf="searchOpen()" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- Search Panel -->
  <div class="nav__search-panel" [class.open]="searchOpen()">
    <form class="nav__search-form" (submit)="onFormSubmit($event)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input
        #searchInput
        type="text"
        placeholder="Search nonfiction books, authors..."
        (keydown)="onKey($event)"
        autocomplete="off"
        class="nav__search-input"
      />
      <button type="submit" class="search-submit" aria-label="Search">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </form>
  </div>
</header>

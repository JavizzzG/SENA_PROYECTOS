spring.application.name=bookit-backend

# DataSource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db:5432/bookit}
spring.datasource.username=${POSTGRES_USER:bookit}
spring.datasource.password=${POSTGRES_PASSWORD:bookit123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server
server.port=${PORT:8080}

